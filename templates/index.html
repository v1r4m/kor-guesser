<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOR Guesser</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 로딩 -->
    <div id="loading">
        <div class="spinner"></div>
        로딩 중...
    </div>

    <div id="game">
        <!-- HUD -->
        <div id="hud">
            <div class="logo">KOR <span>Guesser</span></div>
            <div class="score-display">
                <div>
                    <span class="label">라운드</span>
                    <span class="value" id="round-num">1/5</span>
                </div>
                <div>
                    <span class="label">총점</span>
                    <span class="value" id="total-score">0</span>
                </div>
            </div>
        </div>

        <!-- 파노라마 뷰어 (Three.js 큐브맵) -->
        <div id="panorama-container"></div>

        <!-- 미니 지도 -->
        <div id="map-panel">
            <div id="map"></div>
        </div>

        <!-- 추측 버튼 -->
        <button id="guess-btn" onclick="submitGuess()">여기다!</button>
    </div>

    <!-- 결과 -->
    <div id="result-overlay">
        <div id="result-card">
            <div id="result-map"></div>
            <h2 id="result-score">0</h2>
            <div class="distance-text" id="result-distance"></div>
            <div class="hint-text" id="result-hint"></div>
            <div class="score-bar-track">
                <div class="score-bar-fill" id="score-bar"></div>
            </div>
            <button id="next-btn" onclick="nextRound()">다음 라운드</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
        // 게임 상태
        let currentPano = null;
        let guessMarker = null;
        let round = 0;
        let totalScore = 0;
        const maxRounds = 5;
        let map, resultMap;

        // 지도 초기화
        function initMap() {
            map = L.map('map', {
                center: [36.5, 127.5],
                zoom: 7,
                zoomControl: false,
            });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19,
            }).addTo(map);

            map.on('click', function(e) {
                if (guessMarker) map.removeLayer(guessMarker);
                guessMarker = L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: '',
                        html: '<div style="width:16px;height:16px;background:#a855f7;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>',
                        iconSize: [16, 16],
                        iconAnchor: [8, 8],
                    })
                }).addTo(map);
                document.getElementById('guess-btn').style.display = 'block';
            });
        }

        // Three.js 파노라마 상태
        let panoScene = null, panoCamera = null, panoRenderer = null, panoAnimId = null;

        function destroyPanorama() {
            if (panoAnimId) { cancelAnimationFrame(panoAnimId); panoAnimId = null; }
            if (panoRenderer) {
                panoRenderer.dispose();
                panoRenderer = null;
            }
            const container = document.getElementById('panorama-container');
            const canvas = container.querySelector('canvas');
            if (canvas) canvas.remove();
            panoScene = null;
            panoCamera = null;
        }

        function extractFace(img, index, faceSize) {
            const canvas = document.createElement('canvas');
            canvas.width = faceSize;
            canvas.height = faceSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, index * faceSize, 0, faceSize, faceSize, 0, 0, faceSize, faceSize);
            return canvas;
        }

        function initPanorama(panoramaUrl) {
            destroyPanorama();
            const container = document.getElementById('panorama-container');

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            panoScene = scene;
            panoCamera = camera;
            panoRenderer = renderer;

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const faceSize = img.height;
                const faceCanvases = [];
                for (let i = 0; i < 6; i++) {
                    faceCanvases.push(extractFace(img, i, faceSize));
                }

                const textures = faceCanvases.map(c => {
                    const tex = new THREE.CanvasTexture(c);
                    tex.colorSpace = THREE.SRGBColorSpace;
                    return tex;
                });

                // Naver strip: left(0), front(1), right(2), back(3), bottom(4), top(5)
                // Three.js BoxGeometry: +X(right), -X(left), +Y(top), -Y(bottom), +Z(front), -Z(back)
                const materials = [
                    new THREE.MeshBasicMaterial({ map: textures[0], side: THREE.BackSide }), // +X
                    new THREE.MeshBasicMaterial({ map: textures[2], side: THREE.BackSide }), // -X
                    new THREE.MeshBasicMaterial({ map: textures[5], side: THREE.BackSide }), // +Y
                    new THREE.MeshBasicMaterial({ map: textures[4], side: THREE.BackSide }), // -Y
                    new THREE.MeshBasicMaterial({ map: textures[1], side: THREE.BackSide }), // +Z
                    new THREE.MeshBasicMaterial({ map: textures[3], side: THREE.BackSide }), // -Z
                ];

                const geometry = new THREE.BoxGeometry(100, 100, 100);
                const cube = new THREE.Mesh(geometry, materials);
                scene.add(cube);

                // UV 뒤집기 (큐브 안쪽에서 보기)
                const uvAttr = geometry.attributes.uv;
                for (let i = 0; i < uvAttr.count; i++) {
                    uvAttr.setX(i, 1.0 - uvAttr.getX(i));
                }
                uvAttr.needsUpdate = true;

                document.getElementById('loading').style.display = 'none';

                function animate() {
                    panoAnimId = requestAnimationFrame(animate);
                    renderer.render(scene, camera);
                }
                animate();
            };
            img.onerror = () => {
                document.getElementById('loading').style.display = 'none';
            };
            img.src = panoramaUrl;

            // 마우스/터치 컨트롤
            let isDown = false, prevX = 0, prevY = 0;
            let lon = 0, lat = 0;

            function updateCamera() {
                const phi = THREE.MathUtils.degToRad(90 - lat);
                const theta = THREE.MathUtils.degToRad(lon);
                const target = new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta),
                    Math.cos(phi),
                    Math.sin(phi) * Math.sin(theta)
                );
                camera.lookAt(target);
            }
            updateCamera();

            renderer.domElement.addEventListener('pointerdown', (e) => {
                isDown = true;
                prevX = e.clientX;
                prevY = e.clientY;
            });
            renderer.domElement.addEventListener('pointermove', (e) => {
                if (!isDown) return;
                lon += (prevX - e.clientX) * 0.2;
                lat += (e.clientY - prevY) * 0.2;
                lat = Math.max(-85, Math.min(85, lat));
                prevX = e.clientX;
                prevY = e.clientY;
                updateCamera();
            });
            renderer.domElement.addEventListener('pointerup', () => { isDown = false; });
            renderer.domElement.addEventListener('pointerleave', () => { isDown = false; });

            // 스크롤 줌
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.fov = Math.max(30, Math.min(100, camera.fov + e.deltaY * 0.05));
                camera.updateProjectionMatrix();
            }, { passive: false });

            // 터치 핀치 줌
            let lastPinchDist = 0;
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
                }
            });
            renderer.domElement.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    camera.fov = Math.max(30, Math.min(100, camera.fov - (dist - lastPinchDist) * 0.1));
                    camera.updateProjectionMatrix();
                    lastPinchDist = dist;
                }
            });

            // 리사이즈
            const onResize = () => {
                if (!panoRenderer) return;
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            };
            window.addEventListener('resize', onResize);
        }

        // 새 라운드
        async function startRound() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('guess-btn').style.display = 'none';
            if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }

            // 지도 리셋
            map.setView([36.5, 127.5], 7);

            round++;
            document.getElementById('round-num').textContent = `${round}/${maxRounds}`;

            const res = await fetch('/api/round');
            currentPano = await res.json();

            initPanorama(currentPano.image_url);
        }

        // 추측 제출
        async function submitGuess() {
            if (!guessMarker || !currentPano) return;

            const latlng = guessMarker.getLatLng();
            const res = await fetch('/api/guess', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    pano_id: currentPano.id,
                    lat: latlng.lat,
                    lng: latlng.lng,
                }),
            });
            const data = await res.json();

            totalScore += data.score;
            document.getElementById('total-score').textContent = totalScore;
            showResult(data, latlng);
        }

        // 결과 표시
        function showResult(data, guessLatLng) {
            const overlay = document.getElementById('result-overlay');
            overlay.classList.add('active');

            document.getElementById('result-score').textContent = `${data.score} 점`;
            document.getElementById('result-distance').textContent = `${data.distance_km} km 차이`;
            document.getElementById('result-hint').textContent = data.hint;

            // 점수 바
            const pct = (data.score / 5000) * 100;
            const bar = document.getElementById('score-bar');
            bar.style.width = '0%';
            setTimeout(() => bar.style.width = pct + '%', 100);

            // 결과 지도
            if (resultMap) resultMap.remove();
            resultMap = L.map('result-map', { zoomControl: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19,
            }).addTo(resultMap);

            const actual = [data.actual_lat, data.actual_lng];
            const guess = [guessLatLng.lat, guessLatLng.lng];

            // 정답 마커
            L.marker(actual, {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="width:16px;height:16px;background:#22c55e;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8],
                })
            }).addTo(resultMap);

            // 추측 마커
            L.marker(guess, {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="width:16px;height:16px;background:#a855f7;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8],
                })
            }).addTo(resultMap);

            // 연결선
            L.polyline([actual, guess], {
                color: '#fff',
                weight: 2,
                dashArray: '6, 8',
                opacity: 0.7,
            }).addTo(resultMap);

            const bounds = L.latLngBounds([actual, guess]);
            resultMap.fitBounds(bounds, { padding: [30, 30] });

            // 마지막 라운드면 버튼 텍스트 변경
            if (round >= maxRounds) {
                document.getElementById('next-btn').textContent = `최종 점수: ${totalScore}`;
                document.getElementById('next-btn').onclick = () => {
                    round = 0;
                    totalScore = 0;
                    document.getElementById('total-score').textContent = '0';
                    document.getElementById('next-btn').textContent = '다음 라운드';
                    document.getElementById('next-btn').onclick = nextRound;
                    overlay.classList.remove('active');
                    startRound();
                };
            }
        }

        function nextRound() {
            document.getElementById('result-overlay').classList.remove('active');
            startRound();
        }

        // 시작
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            startRound();
        });
    </script>
</body>
</html>
